<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Vault interior IoT feed placeholder">
  <defs>
    <radialGradient id="vault" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1815"/>
      <stop offset="60%" stop-color="#0c0b09"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7c98a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e7c98a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e7c98a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vault)"/>
  <!-- vault bars -->
  <g stroke="#2a2622" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="40" x2="320" y2="40"/>
    <line x1="0" y1="80" x2="320" y2="80"/>
    <line x1="0" y1="120" x2="320" y2="120"/>
    <line x1="0" y1="160" x2="320" y2="160"/>
    <line x1="60" y1="0" x2="60" y2="180"/>
    <line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/>
  </g>
  <!-- watch silhouette in center -->
  <g transform="translate(160 90)" opacity="0.55">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#e7c98a" stroke-width="1"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#e7c98a" stroke-width="0.5"/>
    <rect x="-6" y="-30" width="12" height="8" fill="none" stroke="#e7c98a" stroke-width="0.8"/>
    <rect x="-6" y="22" width="12" height="8" fill="none" stroke="#e7c98a" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="0" y2="-12" stroke="#e7c98a" stroke-width="1"/>
    <line x1="0" y1="0" x2="9" y2="0" stroke="#e7c98a" stroke-width="0.8"/>
  </g>
  <!-- scanline -->
  <rect x="0" y="0" width="320" height="40" fill="url(#scan)">
    <animate attributeName="y" from="-40" to="180" dur="3.2s" repeatCount="indefinite"/>
  </rect>
  <!-- corner crosshairs -->
  <g stroke="#e7c98a" stroke-width="1" fill="none" opacity="0.7">
    <path d="M8,8 L8,20 M8,8 L20,8"/>
    <path d="M312,8 L300,8 M312,8 L312,20"/>
    <path d="M8,172 L8,160 M8,172 L20,172"/>
    <path d="M312,172 L300,172 M312,172 L312,160"/>
  </g>
  <!-- grain noise -->
  <g opacity="0.08">
    <rect x="40" y="60" width="1" height="1" fill="#fff"/>
    <rect x="120" y="100" width="1" height="1" fill="#fff"/>
    <rect x="200" y="40" width="1" height="1" fill="#fff"/>
    <rect x="260" y="140" width="1" height="1" fill="#fff"/>
    <rect x="80" y="150" width="1" height="1" fill="#fff"/>
  </g>
  <!-- timestamp -->
  <text x="12" y="174" font-family="JetBrains Mono, monospace" font-size="7" fill="#7a6f5e" letter-spacing="1">VX-CCTV · MOCK · 0001</text>
</svg>
