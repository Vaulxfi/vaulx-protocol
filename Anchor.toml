[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
trdc    = "FcDPvRaixjAz7LeC64h9xkXPzvHT7dusbNmg83eJfr7R"
vault   = "4PPyUvazjDBvFndGUL2rgKTwZrFbsSP1tk4a2uMhE9MS"
loan    = "BHdxEKkfsyjERiz5XiUybDLquvoWRtF7r1zDgVCDZJow"
auction = "8FRBHN14CsA2y21hMeJJ2oxbEXNRXicVKMEDHRGyGefj"

[programs.devnet]
trdc    = "FcDPvRaixjAz7LeC64h9xkXPzvHT7dusbNmg83eJfr7R"
vault   = "4PPyUvazjDBvFndGUL2rgKTwZrFbsSP1tk4a2uMhE9MS"
loan    = "BHdxEKkfsyjERiz5XiUybDLquvoWRtF7r1zDgVCDZJow"
auction = "8FRBHN14CsA2y21hMeJJ2oxbEXNRXicVKMEDHRGyGefj"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet  = "~/.config/solana/id.json"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.anchor.json -t 1000000 tests/**/*.ts"

# External programs loaded into the local validator from pre-downloaded .so
# files. Cloning from a remote cluster at startup hits an agave-validator
# 1.18.26 macOS bug ("extra entry found: ._genesis.bin"), so we ship local
# program binaries via [[test.genesis]] instead of [[test.validator.clone]].
# Refresh via:
#   solana program dump -u mainnet-beta gatem74V238djXdzWnJf94Wo1DcnuGkfijbf3AuBhfs tests/sbf-programs/civic-gateway.so
#   solana program dump -u devnet       BGUMAp9Gq7iTEuizy4pqaxsTyUCBK68MDfK752saRPUY tests/sbf-programs/mpl-bubblegum.so
#   solana program dump -u devnet       cmtDvXumGCrqC1Age74AVPhSRVXJMd8PJS91L8KbNCK tests/sbf-programs/spl-account-compression.so
#   solana program dump -u devnet       noopb9bkMVfRPU8AsbpTUg8AQkHtKwMYZiFUjNRtMmV tests/sbf-programs/spl-noop.so
# Anchor runs `anchor test` with COPYFILE_DISABLE=1 (set inline by callers
# or via the shell env) to suppress macOS AppleDouble metadata files in the
# generated genesis tarball.
[test]
startup_wait = 20000

[[test.genesis]]
address = "gatem74V238djXdzWnJf94Wo1DcnuGkfijbf3AuBhfs"
program = "tests/sbf-programs/civic-gateway.so"

# Task 4.2 — Metaplex Bubblegum cNFT mint program.
[[test.genesis]]
address = "BGUMAp9Gq7iTEuizy4pqaxsTyUCBK68MDfK752saRPUY"
program = "tests/sbf-programs/mpl-bubblegum.so"

[[test.genesis]]
address = "cmtDvXumGCrqC1Age74AVPhSRVXJMd8PJS91L8KbNCK"
program = "tests/sbf-programs/spl-account-compression.so"

[[test.genesis]]
address = "noopb9bkMVfRPU8AsbpTUg8AQkHtKwMYZiFUjNRtMmV"
program = "tests/sbf-programs/spl-noop.so"
